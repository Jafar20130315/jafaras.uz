<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFS Liveries | Jafar</title>
    <style>
        /* Umumiy sozlamalar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        header h1 {
            color: #0099CC; /* O'zbekiston bayrog'i ko'k rangi */
        }

        /* Grid va Karta dizayni */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }
        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid #eee;
        }
        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        .download-btn {
            display: block;
            background-color: #1EB53A; /* O'zbekiston bayrog'i yashil rangi */
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            transition: background 0.3s ease;
            margin-top: auto;
        }
        .download-btn:hover {
            background-color: #17912d;
        }
    </style>
</head>
<body>

    <header>
        <h1>GeoFS LiverySelector Liveries</h1>
    </header>

    <main>
        <div id="livery-container" class="grid-container"></div>
    </main>

    <script>

        const liveries = [
            {
                id: 1,
                name: "Sukhoi Su-35 - Uzbekistan Air Force",
                image: "https://i.ibb.co/t0KtjX6/image.png", // Rasm joylashgan joyni to'g'irla (masalan: assets/su35.jpg)
                downloadLink: "https://raw.githubusercontent.com/Jafar20130315/ALTIS-gpws-sounds-for-geofs/refs/heads/main/liveries/Sukhoi-Su-35-Uzbekistan-Livery.png" // Yuklab olinadigan rasm manzili
            } 
        const container = document.getElementById('livery-container');

        liveries.forEach(livery => {
            const card = document.createElement('div');
            card.className = 'card';

            card.innerHTML = `
                <img src="${livery.image}" alt="${livery.name}">
                <div class="card-content">
                    <h2 class="card-title">${livery.name}</h2>
                    <a href="${livery.downloadLink}" class="download-btn" download target="_blank">Download</a>
                </div>
            `;

            container.appendChild(card);
        });
    </script>

</body>
</html>
